<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>гетто казик 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c0d;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .casino-card {
            background-color: #141619;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.05);
            text-align: center;
            width: 450px;
            border: 1px solid #1f2326;
        }
        .balance-main {
            color: #4ef060;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .balance-letters {
            color: #7a828a;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .label-text {
            color: #8c969e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }
        select, input {
            background-color: #202428;
            color: #ffffff;
            border: 1px solid #31373e;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            outline: none;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .col {
            flex: 1;
        }
        .slots-container {
            background-color: #0b0c0d;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            min-height: 46px;
            align-items: center;
        }
        .slot-box {
            background-color: #202428;
            border: 2px solid #31373e;
            border-radius: 6px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #4ef060;
            text-transform: uppercase;
        }
        .btn-spin {
            background-color: #00cc52;
            color: #000000;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 204, 82, 0.2);
        }
        .btn-spin:hover {
            background-color: #00ff66;
        }
        .result-message {
            margin-top: 20px;
            font-size: 13px;
            color: #e6b800;
            min-height: 36px;
        }
        .secret-alert {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ff3333;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="secret-alert" id="secret-alert">чит-код активирован</div>

<div class="casino-card">
    <div class="balance-main" id="balance-display">баланс: 0 руб.</div>
    <div class="balance-letters" id="balance-letters-display">
        прописью: 0 руб.<br>
        до бесконечности: расчет...
    </div>

    <span class="label-text">твоя главная цель в жизни</span>
    <select id="target-select" onchange="handleTargetChange()">
        <option value="ХУЙ">собрать ХУЙ</option>
        <option value="ЕБЛАН">собрать ЕБЛАН</option>
        <option value="ПИДОР">собрать ПИДОР</option>
    </select>

    <div class="row">
        <div class="col">
            <span class="label-text">кол-во слотов</span>
            <select id="slots-select">
                <option value="3">3</option>
                <option value="5">5</option>
            </select>
        </div>
        <div class="col">
            <span class="label-text">ставка</span>
            <input type="text" id="bet-input" value="100">
        </div>
    </div>

    <div class="slots-container" id="slots-container">
        <div class="slot-box">—</div>
        <div class="slot-box">—</div>
        <div class="slot-box">—</div>
    </div>

    <button class="btn-spin" onclick="spin()">крутить</button>

    <div class="result-message" id="result-display"></div>
</div>

<script>
    // ================= НАСТРОЙКА СЕКРЕТНЫХ КНОПОК =================
    // укажи здесь число для прибавления при нажатии на L (сейчас 10 септиллионов)
    const SECRET_PLUS_AMOUNT = 10000000000000000000000000n; 
    
    // укажи здесь число, на которое умножать баланс при нажатии на K
    const SECRET_MULTIPLY_BY = 2n;
    // ==============================================================

    const maxJsNumber = 17976931348623157081452742373170435679807056752584499659891747680315726078002853876602841604862869853802707627511090146938459102431627447370420556114170685640321300057399439616010061329241517409249704289895240292376971510344482083512411547734028420155225345791771954714163901115161099238314115132219904229344n;

    const shortNames = [
        "", "тыс.", "млн.", "млрд.", "трил.", "квадр.", "квинт.", 
        "секстил.", "септили.", "октил.", "нонил.", "децил.", 
        "ундецил.", "дуодецил.", "тредецил.", "кваттордецил.", "квиндецил.",
        "секстдецил.", "септемдецил.", "октодецил.", "нонемдецил.", "вигинтил."
    ];

    const alphabet = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

    let balance = 10000n;
    if (localStorage.getItem('ghetto_balance_big')) {
        try {
            balance = BigInt(localStorage.getItem('ghetto_balance_big'));
        } catch(e) {
            balance = 10000n;
        }
    }

    handleTargetChange();
    updateUI();

    setInterval(() => {
        balance += 10000n;
        saveBalance();
        updateUI();
    }, 10000);

    // обработка чит-кодов L и K
    window.addEventListener("keydown", function(event) {
        let key = event.key.toLowerCase();
        let alertBox = document.getElementById("secret-alert");
        
        if (key === "l" || key === "д") {
            balance += SECRET_PLUS_AMOUNT;
            saveBalance();
            updateUI();
            
            alertBox.innerText = `чит-код: +${SECRET_PLUS_AMOUNT.toString()}`;
            alertBox.style.opacity = "1";
            setTimeout(() => { alertBox.style.opacity = "0"; }, 1000);
        }
        
        if (key === "k" || key === "л") {
            balance = balance * SECRET_MULTIPLY_BY;
            saveBalance();
            updateUI();
            
            alertBox.innerText = `чит-код: умножено на ${SECRET_MULTIPLY_BY.toString()}`;
            alertBox.style.opacity = "1";
            setTimeout(() => { alertBox.style.opacity = "0"; }, 1000);
        }
    });

    function handleTargetChange() {
        const target = document.getElementById("target-select").value;
        const slotsSelect = document.getElementById("slots-select");
        
        if (target === "ХУЙ") {
            slotsSelect.value = "3";
        } else {
            slotsSelect.value = "5";
        }
        buildSlots(parseInt(slotsSelect.value));
    }

    function buildSlots(count) {
        const container = document.getElementById("slots-container");
        container.innerHTML = "";
        for (let i = 0; i < count; i++) {
            const box = document.createElement("div");
            box.className = "slot-box";
            box.innerText = "—";
            container.appendChild(box);
        }
    }

    function formatBigNumber(value) {
        let num = BigInt(value);
        if (num === 0n) return "0 руб.";
        
        let str = num.toString();
        let length = str.length;
        
        if (length <= 3) return `${str} руб.`;
        
        let groupIndex = Math.floor((length - 1) / 3);
        
        if (groupIndex >= shortNames.length) {
            return "дохерархи миллиардов";
        }
        
        let mainPartLength = length % 3 === 0 ? 3 : length % 3;
        let mainPart = str.slice(0, mainPartLength);
        let fractionalPart = str.slice(mainPartLength, mainPartLength + 2);
        
        if (fractionalPart === "00" || fractionalPart === "") {
            fractionalPart = "";
        } else if (fractionalPart[1] === "0") {
            fractionalPart = "." + fractionalPart[0];
        } else {
            fractionalPart = "." + fractionalPart;
        }
        
        return `${mainPart}${fractionalPart} ${shortNames[groupIndex]}`;
    }

    function updateUI() {
        document.getElementById("balance-display").innerText = `баланс: ${balance.toString()} руб.`;
        
        let textForm = formatBigNumber(balance);
        let distanceText = "";
        
        if (balance >= maxJsNumber) {
            distanceText = "ты превзошел лимиты вселенной";
        } else {
            let remaining = maxJsNumber - balance;
            distanceText = formatBigNumber(remaining);
        }
        
        document.getElementById("balance-letters-display").innerHTML = `
            прописью: <span style="color: #ccc;">${textForm} руб.</span><br>
            до бесконечности: <span style="color: #ccc;">${distanceText} руб.</span>
        `;
    }

    function saveBalance() {
        localStorage.setItem('ghetto_balance_big', balance.toString());
    }

    function spin() {
        let betInput = document.getElementById("bet-input").value;
        let bet = 100n;
        
        try {
            betInput = betInput.replace(/[^0-9]/g, '');
            if (!betInput) betInput = "100";
            bet = BigInt(betInput);
        } catch(e) {
            bet = 100n;
        }

        if (bet <= 0n) {
            alert("нормальную ставку поставь");
            return;
        }

        if (balance < bet) {
            alert("не хватает бабок на такую ставку, жди пособия");
            return;
        }

        balance -= bet;
        
        const target = document.getElementById("target-select").value;
        const slotsCount = parseInt(document.getElementById("slots-select").value);
        const boxes = document.querySelectorAll(".slot-box");
        
        let resultArr = [];
        let isLucky = Math.random() < 0.25;
        
        if (isLucky) {
            let targetArr = target.split("");
            while (targetArr.length < slotsCount) {
                targetArr.push(alphabet[Math.floor(Math.random() * alphabet.length)]);
            }
            resultArr = targetArr;
        } else {
            for (let i = 0; i < slotsCount; i++) {
                let randomLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
                resultArr.push(randomLetter);
            }
        }
        
        for (let i = 0; i < slotsCount; i++) {
            boxes[i].innerText = resultArr[i];
        }
        
        let currentWord = resultArr.join("");
        let resultDisplay = document.getElementById("result-display");
        
        if (currentWord.includes(target)) {
            let winAmount = bet * 50n;
            balance += winAmount;
            resultDisplay.innerHTML = `🎉 ЦЕЛЬ ЖИЗНИ ДОСТИГНУТА! ты собрал ${target}! МЕГА-ИКС x50! 🎉 (+${winAmount.toString()} руб.)`;
        } else {
            resultDisplay.innerText = "мимо! крути еще!";
        }
        
        saveBalance();
        updateUI();
    }
</script>

</body>
</html>
